experiments:
  - experiment_id: jasist-csl-abstract-macbert-ls-screen-seed13
    dataset: csl_instruction_discipline_abstract
    baseline_name: macbert-base
    model_name: jasist-csl-abstract-macbert-base-ls
    model_id: hfl/chinese-macbert-base
    pooling: cls
    head: linear
    loss: label_smoothing
    schedule: full_ft
    augmentation: none
    budget: screen
    seeds: [13]
    rationale: "Stronger same-size Chinese encoder baseline for CSL abstract-to-67-discipline classification."
    expected_risk: medium
    tags: [jasist, csl, abstract, discipline, macbert, label_smoothing, screen, seed13, stronger_baseline]
    hyperparameters:
      label_smoothing: 0.05

  - experiment_id: jasist-csl-abstract-macbert-autotail-bsaux-fgm-screen-seed13
    dataset: csl_instruction_discipline_abstract
    baseline_name: macbert-base
    model_name: jasist-csl-abstract-macbert-base-autotail-bsaux-fgm
    model_id: hfl/chinese-macbert-base
    pooling: cls
    head: linear
    loss: prior_adjusted_label_smoothing
    schedule: full_ft
    augmentation: none
    budget: screen
    seeds: [13]
    rationale: "Check whether the paper-facing method remains useful on a stronger Chinese base encoder."
    expected_risk: medium
    tags: [jasist, csl, abstract, discipline, macbert, auto_tail, balanced_softmax_aux, fgm, screen, seed13, stronger_baseline]
    hyperparameters:
      label_smoothing: 0.05
      prior_adjustment_tau: 0.15
      class_prior_smoothing: 1.0
      prior_adjustment_mode: auto_tail
      prior_tail_quantile: 0.5
      prior_min_imbalance_index: 0.1
      balanced_softmax_aux_weight: 0.1
      balanced_softmax_aux_tau: 0.25
      balanced_softmax_aux_label_smoothing: 0.0
      fgm_epsilon: 0.3
      fgm_weight: 0.5
