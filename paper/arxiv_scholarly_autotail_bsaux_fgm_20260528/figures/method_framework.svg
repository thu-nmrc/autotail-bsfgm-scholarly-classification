<rect x="0" y="0" width="1400" height="920" fill="#ffffff"/>
<text x="70" y="70" font-family="Arial, Helvetica, sans-serif" font-size="38" font-weight="700" fill="#203a33" text-anchor="start" >AutoTail-BSFGM: training-time objective with unchanged inference</text>
<line x1="70" y1="84" x2="1330" y2="84" stroke="#b8c4bb" stroke-width="2"/>
<text x="70" y="118" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="400" fill="#69736e" text-anchor="start" >Baseline and candidate share the encoder/classifier; AutoTail-BSFGM modifies only the loss and training dynamics.</text>
