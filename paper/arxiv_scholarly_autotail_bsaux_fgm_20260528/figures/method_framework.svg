<text x="935.0" y="221" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="500" fill="#25302c" text-anchor="middle" >same head</text>
<line x1="1038" y1="204.0" x2="1077" y2="204.0" stroke="#9eb0a3" stroke-width="2.4" marker-end="url(#arrow)"/>
<rect x="1085" y="165" width="160" height="78" rx="10" fill="#f7f8f5" stroke="#aab8ad" stroke-width="2"/>
<text x="1165.0" y="196" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700" fill="#203a33" text-anchor="middle" >Logits</text>
<text x="1165.0" y="221" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="500" fill="#25302c" text-anchor="middle" >zᵢ</text>
<line x1="1253" y1="204.0" x2="1277" y2="204.0" stroke="#9eb0a3" stroke-width="2.4" marker-end="url(#arrow)"/>
<rect x="1285" y="165" width="90" height="78" rx="10" fill="#f4efe2" stroke="#c7b98f" stroke-width="2"/>
<text x="1330.0" y="196" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700" fill="#203a33" text-anchor="middle" >Pred.</text>
<text x="1330.0" y="221" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="500" fill="#25302c" text-anchor="middle" >ŷ</text>
<text x="700" y="292" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="700" fill="#69736e" text-anchor="middle" >shared inference path</text>
<rect x="80" y="345" width="430" height="135" rx="12" fill="white" stroke="#203a33" stroke-width="2.5"/>
<rect x="80" y="345" width="430" height="44" rx="12" fill="#eef3ee" stroke="none"/>
<text x="105" y="374" font-family="Arial, Helvetica, sans-serif" font-size="21" font-weight="700" fill="#203a33" text-anchor="start" >Baseline: label-smoothed CE</text>
<text x="115" y="430" font-family="Arial, Helvetica, sans-serif" font-size="23" font-weight="500" fill="#25302c" text-anchor="start" >loss = label-smoothed CE</text>
<text x="115" y="458" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="400" fill="#69736e" text-anchor="start" >reported: ε = 0.05</text>
<rect x="80" y="565" width="430" height="190" rx="12" fill="#f7f8f5" stroke="#aab8ad" stroke-width="2"/>
<text x="110" y="610" font-family="Arial, Helvetica, sans-serif" font-size="21" font-weight="700" fill="#203a33" text-anchor="start" >Inference constraint</text>
<circle cx="120" cy="642" r="4.5" fill="#49665b"/>
<text x="138" y="648" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="400" fill="#25302c" text-anchor="start" >single base-size encoder</text>
<circle cx="120" cy="674" r="4.5" fill="#49665b"/>
<text x="138" y="680" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="400" fill="#25302c" text-anchor="start" >same linear classifier</text>
<circle cx="120" cy="706" r="4.5" fill="#49665b"/>
<text x="138" y="712" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="400" fill="#25302c" text-anchor="start" >no ensemble or external data</text>
<circle cx="120" cy="738" r="4.5" fill="#49665b"/>
<text x="138" y="744" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="400" fill="#25302c" text-anchor="start" >no AutoTail/BSAux/FGM branch at serving</text>
<rect x="585" y="345" width="735" height="410" rx="16" fill="white" stroke="#203a33" stroke-width="2.8"/>
<rect x="585" y="345" width="735" height="44" rx="16" fill="#eef3ee" stroke="none"/>
<text x="613" y="376" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700" fill="#203a33" text-anchor="start" >Candidate: AutoTail-BSFGM training objective</text>
<rect x="1180" y="358" width="105" height="24" rx="5" fill="#f8e7e2" stroke="none" stroke-width="2"/>
<text x="1232" y="376" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="700" fill="#b2776b" text-anchor="middle" >training only</text>
<rect x="620" y="415" width="335" height="95" rx="8" fill="#f7f8f5" stroke="#49665b" stroke-width="2"/>
<text x="640" y="445" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700" fill="#203a33" text-anchor="start" >AutoTail prior</text>
<text x="640" y="473" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="400" fill="#25302c" text-anchor="start" >estimate imbalance from label counts</text>
<text x="640" y="497" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="400" fill="#69736e" text-anchor="start" >activate only when tail risk is detected</text>
<rect x="1000" y="415" width="285" height="95" rx="8" fill="#f7f8f5" stroke="#49665b" stroke-width="2"/>
<text x="1020" y="445" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700" fill="#203a33" text-anchor="start" >Masked log-prior correction</text>
<text x="1020" y="473" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="400" fill="#25302c" text-anchor="start" >apply prior only to tail labels</text>
<text x="1020" y="497" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="400" fill="#69736e" text-anchor="start" >adjust logits before supervised loss</text>
<rect x="620" y="550" width="335" height="95" rx="8" fill="#f4efe2" stroke="#c7b98f" stroke-width="2"/>
<text x="640" y="580" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700" fill="#203a33" text-anchor="start" >Weak BS auxiliary loss</text>
<text x="640" y="608" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="400" fill="#25302c" text-anchor="start" >adds class-count-aware supervision</text>
<text x="640" y="632" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="400" fill="#69736e" text-anchor="start" >weak auxiliary, not the main loss</text>
<rect x="1000" y="550" width="285" height="95" rx="8" fill="#eef4f8" stroke="#49665b" stroke-width="2"/>
<text x="1020" y="580" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700" fill="#203a33" text-anchor="start" >FGM regularization</text>
<text x="1020" y="608" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="400" fill="#25302c" text-anchor="start" >embedding-level adversarial step</text>
<text x="1020" y="632" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="400" fill="#69736e" text-anchor="start" >training robustness; no serving cost</text>
<line x1="955" y1="463" x2="1000" y2="463" stroke="#49665b" stroke-width="2.2" marker-end="url(#arrow)"/>
<line x1="1165" y1="243" x2="1165" y2="415" stroke="#49665b" stroke-width="2.2" marker-end="url(#arrow)"/>
<path d="M 1142 510 C 1142 530, 1142 535, 1142 550" stroke="#9eb0a3" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
<rect x="725" y="675" width="460" height="58" rx="8" fill="#f7f8f5" stroke="#203a33" stroke-width="2"/>
<text x="955" y="710" font-family="Arial, Helvetica, sans-serif" font-size="19" font-weight="500" fill="#203a33" text-anchor="middle" >final loss = LS + weak BSAux + adversarial FGM</text>
<text x="955" y="731" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="400" fill="#69736e" text-anchor="middle" >fixed reported hyperparameters across seeds; no inference-time branch</text>
<path d="M 785 645 C 845 670, 885 675, 945 675" stroke="#9eb0a3" stroke-width="1.8" fill="none" marker-end="url(#arrow)"/>
<path d="M 1140 645 C 1105 670, 1065 675, 1005 675" stroke="#9eb0a3" stroke-width="1.8" fill="none" marker-end="url(#arrow)"/>
<path d="M 830 645 C 830 675, 885 675, 915 675" stroke="#9eb0a3" stroke-width="1.8" fill="none" marker-end="url(#arrow)"/>
<rect x="80" y="815" width="1240" height="72" rx="0" fill="#f7f8f5" stroke="#aab8ad" stroke-width="2"/>
<text x="110" y="850" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700" fill="#203a33" text-anchor="start" >Design logic</text>
<text x="260" y="850" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="400" fill="#25302c" text-anchor="start" >AutoTail changes prior geometry only when imbalance is detected; BSAux adds weak count-aware supervision; FGM improves local stability.</text>
<text x="260" y="875" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="400" fill="#69736e" text-anchor="start" >The method is a conservative fine-tuning recipe, not a new encoder architecture or leaderboard-only trick.</text>
</svg>
