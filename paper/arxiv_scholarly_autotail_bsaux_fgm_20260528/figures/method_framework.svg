<text x="155.0" y="221" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="500" fill="#25302c" text-anchor="middle" >xᵢ</text>
<line x1="238" y1="204.0" x2="277" y2="204.0" stroke="#9eb0a3" stroke-width="2.4" marker-end="url(#arrow)"/>
<rect x="285" y="165" width="255" height="78" rx="10" fill="#f7f8f5" stroke="#aab8ad" stroke-width="2"/>
