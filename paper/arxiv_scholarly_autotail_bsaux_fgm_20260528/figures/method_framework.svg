<text x="690.0" y="221" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="500" fill="#25302c" text-anchor="middle" >same backbone</text>
<line x1="793" y1="204.0" x2="832" y2="204.0" stroke="#9eb0a3" stroke-width="2.4" marker-end="url(#arrow)"/>
