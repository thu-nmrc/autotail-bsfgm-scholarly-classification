experiments:
  - experiment_id: jasist-csl-abstract-autotail-bsaux-fgm-screen-seed42
    dataset: csl_instruction_discipline_abstract
    baseline_name: roberta-wwm-ext
    model_name: jasist-csl-abstract-roberta-wwm-ext-autotail-bsaux-fgm
    model_id: hfl/chinese-roberta-wwm-ext
    pooling: cls
    head: linear
    loss: prior_adjusted_label_smoothing
    schedule: full_ft
    augmentation: none
    budget: screen
    seeds: [42]
    rationale: "Seed-42 ablation for CSL abstract discipline classification: AutoTail plus weak Balanced Softmax auxiliary loss and FGM, without OOF TF-IDF teacher."
    expected_risk: medium
    tags: [jasist, csl, abstract, discipline, roberta, auto_tail, balanced_softmax_aux, fgm, ablation, screen, seed42]
    hyperparameters:
      label_smoothing: 0.05
      prior_adjustment_tau: 0.15
      class_prior_smoothing: 1.0
      prior_adjustment_mode: auto_tail
      prior_tail_quantile: 0.5
      prior_min_imbalance_index: 0.1
      balanced_softmax_aux_weight: 0.1
      balanced_softmax_aux_tau: 0.25
      balanced_softmax_aux_label_smoothing: 0.0
      fgm_epsilon: 0.3
      fgm_weight: 0.5
